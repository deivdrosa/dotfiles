
### =========================
### 🌐 ENV / GPU SETTINGS
### =========================

env = __GL_THREADED_OPTIMIZATIONS,1
env = __GL_SYNC_TO_VBLANK,0

vrf = true
vrr = 1

render {
    direct_scanout = true
}


### =========================
### ⌨️ INPUT (MOUSE + KEYBOARD BASE)
### =========================

exec-once = pgrep -x wl-paste || wl-paste --type text --watch cliphist store
exec-once = pgrep -x wl-paste || wl-paste --type image --watch cliphist store

input {
    follow_mouse = 1
    accel_profile = flat
    sensitivity = 0.0
}

input {
    sensitivity = -0.5
}

input {
    kb_layout = br
    kb_variant = abnt2
}

input {
    repeat_rate = 60
    repeat_delay = 200
}


### =========================
### 🎞️ ANIMATIONS
### =========================

animations {
    enabled = yes

    bezier = fastOut, 0.15, 0.85, 0.35, 1.00
    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 5, fastOut, slide
    animation = windowsOut, 1, 6, fastOut, slide
    animation = border, 1, 8, fastOut
    animation = fade, 1, 6, smooth
    animation = workspaces, 1, 6, smooth, slide
}

workspace_swipe = true


### =========================
### 🧩 MISC SETTINGS
### =========================

misc {
    animate_mouse_windowdragging = false
    disable_hyprland_logo = true
}


### =========================
### 🖥️ MONITOR
### =========================

monitor = HDMI-A-1,1920x1080@59,0x0,1, vrr, 1


### =========================
### 🌐 ENV (GPU EXTRA)
### =========================

env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1


### =========================
### 🎧 SHORTCUTS / FUN
### =========================

bind = SUPER, apostrophe, exec, mpv --no-video "/home/deeh/Downloads/Fahhhh - Sound effect (HD).mp3"
bind = SUPER, W, exec, emote


### =========================
### 🪟 WINDOW RULES (FLOAT/PIN)
### =========================

windowrule = float class:^(eww)$
windowrule = pin class:^(eww)$


### =========================
### 🚀 LAUNCHER
### =========================

$terminal = kitty
$menu = rofi -show drun


### =========================
### 📸 SCREENSHOTS
### =========================

bind = , Print, exec, sh -c 'grim -g "$(slurp)" ~/Pictures/ss-$(date +%s).png && wl-copy < ~/Pictures/ss-$(date +%s).png'
bind = CTRL, Print, exec, screenshot editor
bind = SHIFT, Print, exec, screenshot clip


### =========================
### 🪟 APP SHORTCUTS
### =========================

bind = SUPER, X, exec, ~/.config/hypr/float_quarter.sh
bind = SUPER, D, togglespecialworkspace, files


### =========================
### 🌫️ WINDOW RULES (STEAM)
### =========================

windowrule {
  name = steam
  match {
    class = steam
  }
  opacity = 0.85 0.60
}


### =========================
### 🔎 FUZZLE
### =========================

windowrule {
  name = fuzzel

  match {
    class = ^(fuzzel)$
  }

  float = on
  center = on
  size = 900 500
  rounding = 14
}

windowrule {
  name = fuzzel-raycast

  match {
    class = ^(fuzzel)$
  }

  workspace = special:launcher
  float = on
  center = on
  size = 900 500
  rounding = 14
}


### =========================
### 📁 FILE MANAGER (NEMO)
### =========================

windowrule {
  name = nemo-drawer
  match {
    class = ^(nemo|Nemo)$
  }
  workspace = special:files
  float = on
  center = on
  size = 1000 700
  rounding = 12
}


### =========================
### 💬 VESKTOP (DISCORD)
### =========================

windowrule {
  name = vesktop-drawer
  match {
    class = ^(vesktop|Vesktop)$
  }
  workspace = special:vesktop
  float = on
  center = on
  size = 1000 700
  rounding = 12
}


### =========================
### 🎵 SPOTIFY
### =========================

windowrule {
  name = spotify-drawer
  match {
    class = ^(Spotify)$
  }
  workspace = special:spotify
  float = on
  center = on
  size = 900 600
  rounding = 12
}

windowrule {
  name = spotify-opacity
  match {
    class = Spotify
  }
  opacity = 0.95 0.85
}


### =========================
### 🖼️ IMAGE VIEWER
### =========================

windowrule {
  name = imv-opacity
  match {
    class = imv
  }
  opacity = 0.90 0.75
}


### =========================
### 📁 NEMO OPACITY
### =========================

windowrule {
  name = nemo-opacity
  match {
    class = nemo
  }
  opacity = 0.85 0.60
}


### =========================
### 💬 VESKTOP OPACITY
### =========================

windowrule {
  name = vesktop-opacity
  match {
    class = vesktop
  }
  opacity = 0.85 0.60
}


### =========================
### 🌐 FIREFOX
### =========================

windowrule {
  name = firefox-opacity
  match {
    class = firefox
  }
  opacity = 0.85 0.60
}


### =========================
### 💻 KITTY
### =========================

windowrule {
  name = kitty-opacity
  match {
    class = kitty
  }
  opacity = 0.75 0.50
}


### =========================
### ⌨️ CORE BINDS
### =========================

bind = SUPER, Q, exec, kitty
bind = SUPER, C, killactive
bind = SUPER, E, exec, fuzzel
bind = SUPER, R, exec, hyprctl reload
bind = SUPER, ESCAPE, exit
bind = SUPER, F, fullscreen


### =========================
### 🎨 DECORATION
### =========================

general {
    border_size = 2

    col.active_border = rgba(a88a91ff)
    col.inactive_border = rgba(44444488)
}

decoration {
  rounding = 10

  blur {
    enabled = true
    size = 29
    passes = 8
    new_optimizations = true
    xray = true
    ignore_opacity = false
  }

  shadow {
    enabled = true
    range = 4
    render_power = 3
  }
}


### =========================
### 🎛️ CLIPBOARD / EXTRAS
### =========================

bind = SUPER, V, exec, bash -c "$HOME/.local/bin/clipmenu.sh"


### =========================
### 🖱️ MOUSE BINDS
### =========================

bindm = SUPER, mouse:272, movewindow
bind = SUPER, mouse_up, resizeactive, -40 -40
bind = SUPER, mouse_down, resizeactive, 60 60


### =========================
### 🧭 MOVEMENT (FOCUS / MOVE / RESIZE)
### =========================

bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d

bind = CTRL, LEFT,  moveactive, -70 0
bind = CTRL, RIGHT, moveactive, 70 0
bind = CTRL, UP,    moveactive, 0 -70
bind = CTRL, DOWN,  moveactive, 0 70

bind = ALT, LEFT,  resizeactive, -20 0
bind = ALT, RIGHT, resizeactive, 20 0
bind = ALT, UP,    resizeactive, 0 -20
bind = ALT, DOWN,  resizeactive, 0 20

bind = SUPER SHIFT, Left, movewindow, l
bind = SUPER SHIFT, Right, movewindow, r
bind = SUPER SHIFT, Up, movewindow, u
bind = SUPER SHIFT, Down, movewindow, d


### =========================
### 🧭 WORKSPACES
### =========================

bind = SUPER, TAB, cyclenext, floating, tilted

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3

bind = SUPER, 4, workspace, 4
bind = SUPER, 4, exec, pkill waybar

bind = SUPER, 1, exec, pgrep waybar || waybar
bind = SUPER, 2, exec, pgrep waybar || waybar
bind = SUPER, 3, exec, pgrep waybar || waybar

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4


### =========================
### 🎮 SPECIAL WORKSPACES
### =========================

bind = SUPER, S, togglespecialworkspace, vesktop
bind = SUPER, A, togglespecialworkspace, spotify


### =========================
### 🚀 AUTOSTART
### =========================

exec-once = dunst
exec-once = waybar
exec-once = mako
exec-once = awww-daemon
exec-once = awww img /home/deeh/Pictures/wallpapers/anime.jpg --transition zoom
exec-once = mpv --no-video "/home/deeh/Downloads/JDM Melody box - DkAcidAces (320k).mp3"
exec-once = ~/.config/hypr/waybar-daemon.sh
exec-once = systemctl --user start cliphist.service
exec-once = ~/.local/bin/auto-imv.sh
